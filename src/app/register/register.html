<div class="register-page">
    <div class="register-card">

        <h1>Create Account</h1>
        <p>Register to continue</p>

        <div class="message-container">

            <div
                class="success-message"
                *ngIf="successMessage">
                {{ successMessage }}
            </div>

            <div
                class="error-message"
                *ngIf="errorMessage">
                {{ errorMessage }}
            </div>

        </div>

        <form (ngSubmit)="register()">

            <input
                type="text"
                placeholder="Username"
                [(ngModel)]="username"
                name="username"
                required
            />

            <input
                type="email"
                placeholder="Email"
                [(ngModel)]="email"
                name="email"
                required
            />

            <input
                type="password"
                placeholder="Password"
                [(ngModel)]="password"
                name="password"
                required
            />

            <button type="submit">
                Register
            </button>

        </form>

        <p>
            Already have an account?
            <a routerLink="/login">Login</a>
        </p>

    </div>
</div>
